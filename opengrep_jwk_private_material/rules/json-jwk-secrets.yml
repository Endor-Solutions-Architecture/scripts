rules:
  - id: json-jwk-private-material
    message: "Hardcoded private JWK material in JSON"
    severity: ERROR
    languages: [json]
    metadata:
      category: security
      cwe:
        - CWE-798
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      description: >-
        Detects JSON documents that look like JWKs containing private key
        material (RSA/EC/OKP private fields or symmetric oct k). Canonical
        rule pack:
        https://github.com/Endor-Solutions-Architecture/scripts/tree/main/opengrep_jwk_private_material
      display-name: JSON hardcoded private JWK
      endor-category: vulnerability
      rule-origin-note: github-esa-scripts-opengrep-jwk-private-material
      endor-tags: [jwk, cwe-798, hardcoded-credentials, json, secret-detection]
      technology: [json]
      references:
        - https://datatracker.ietf.org/doc/html/rfc7517
        - https://datatracker.ietf.org/doc/html/rfc7518
    patterns:
      - pattern-either:
          - pattern: |
              {
                "kty": "RSA",
                ...,
                "d": $D,
                ...
              }
          - pattern: |
              {
                "kty": "EC",
                ...,
                "d": $D,
                ...
              }
          - pattern: |
              {
                "kty": "OKP",
                ...,
                "d": $D,
                ...
              }
          - pattern: |
              {
                "kty": "oct",
                ...,
                "k": $K,
                ...
              }
          - pattern: |
              {
                ...,
                "p": $P,
                ...,
                "q": $Q,
                ...
              }
          - pattern: |
              {
                ...,
                "dp": $DP,
                ...,
                "dq": $DQ,
                ...,
                "qi": $QI,
                ...
              }
