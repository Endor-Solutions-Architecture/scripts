rules:
  - id: plaintext-jwk-private-material
    message: "Hardcoded private JWK material in plaintext"
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "**/*.txt"
        - "**/*.conf"
        - "**/*.ini"
        - "**/*.env"
        - "**/*.yaml"
        - "**/*.yml"
        - "**/*.toml"
        - "**/*.cfg"
        - "**/*.config"
        - "**/*.properties"
        - "**/*.tfvars"
        - "**/*.tfvars.json"
    metadata:
      category: security
      cwe:
        - CWE-798
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: HIGH
      description: >-
        Detects JSON-shaped JWK blobs in config or text files that include
        private key fields (d, p, q, dp, k for oct keys). Canonical rule pack:
        https://github.com/Endor-Solutions-Architecture/scripts/tree/main/opengrep_jwk_private_material
      display-name: Plaintext / config hardcoded private JWK
      endor-category: vulnerability
      rule-origin-note: github-esa-scripts-opengrep-jwk-private-material
      endor-tags: [jwk, cwe-798, hardcoded-credentials, secret-detection]
      references:
        - https://datatracker.ietf.org/doc/html/rfc7517
        - https://datatracker.ietf.org/doc/html/rfc7518
    pattern-either:
      - pattern: '"kty":"RSA",...,"d":"..."'
      - pattern: '"kty":"EC",...,"d":"..."'
      - pattern: '"kty":"OKP",...,"d":"..."'
      - pattern: '"kty":"RSA",...,"p":"..."'
      - pattern: '"kty":"RSA",...,"dp":"..."'
      - pattern: '"kty":"oct",...,"k":"..."'
