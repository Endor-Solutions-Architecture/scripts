rules:
  - id: csharp-jwk-private-material
    message: |
      Problem:
      Hard-coded private JWK material in C# source (strict baseline profile).

      Solution:
        1. Replace embedded key material with runtime secret retrieval.
        2. Revoke and rotate exposed key material.
        3. Review access logs for suspicious use.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "**/*.cs"
        - "**/*.csx"
    metadata:
      confidence: HIGH
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      description: Use of hard-coded private JWK material (csharp-jwk-private-material strict baseline)
      endor-category: vulnerability
      endor-tags:
        - A07:2021
        - A07:2025
        - Authentication-Failures
        - Identification-and-Authentication-Failures
        - OWASP-Top-10
        - SANS-Top-25
        - jwk
        - csharp
        - hardcoded-credentials
        - secret-detection
        - jwk-profile-strict-baseline
      endor-targets:
        - ENDOR_TARGET_PACKAGE
        - ENDOR_TARGET_REPOSITORY
      rule-origin-note: github-esa-scripts-opengrep-jwk-private-material
      references:
        - https://datatracker.ietf.org/doc/html/rfc7517
        - https://datatracker.ietf.org/doc/html/rfc7518
      security-severity: HIGH
      source-rule-url: https://github.com/Endor-Solutions-Architecture/scripts/tree/main/opengrep_jwk_private_material
      endor-rule-origin:
        url: https://github.com/Endor-Solutions-Architecture/scripts/tree/main/opengrep_jwk_private_material
        license: MIT
      explanation: Detects hard-coded private JWK material in source files.
      remediation: Move key material to a secrets manager and rotate any exposed keys.
    pattern-either:
      - pattern-regex: '"kty":"RSA"[\\s\\S]{0,1600}"d":"[A-Za-z0-9_-]{32,}"'
      - pattern-regex: '"kty":"EC"[\\s\\S]{0,1600}"d":"[A-Za-z0-9_-]{32,}"'
      - pattern-regex: '"kty":"OKP"[\\s\\S]{0,1600}"d":"[A-Za-z0-9_-]{32,}"'
      - pattern-regex: '"kty":"RSA"[\\s\\S]{0,1600}"p":"[A-Za-z0-9_-]{32,}"[\\s\\S]{0,1600}"q":"[A-Za-z0-9_-]{32,}"[\\s\\S]{0,1600}"dp":"[A-Za-z0-9_-]{32,}"[\\s\\S]{0,1600}"dq":"[A-Za-z0-9_-]{32,}"'
      - pattern-regex: '"kty":"oct"[\\s\\S]{0,1600}"k":"[A-Za-z0-9_-]{32,}"'



