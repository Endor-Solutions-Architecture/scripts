rules:
  - id: json-jwk-private-material
    message: "Hardcoded private JWK material in JSON (strict)"
    severity: ERROR
    languages: [json]
    metadata:
      category: security
      cwe:
        - CWE-798
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      description: >-
        Detects JSON documents that look like JWKs containing private key
        material (strict profile: metavariable length/charset constraints).
        Canonical rule pack:
        https://github.com/Endor-Solutions-Architecture/scripts/tree/main/opengrep_jwk_private_material
      display-name: JSON hardcoded private JWK (strict)
      endor-category: vulnerability
      rule-origin-note: github-esa-scripts-opengrep-jwk-private-material
      endor-tags:
        - jwk
        - cwe-798
        - hardcoded-credentials
        - json
        - secret-detection
        - jwk-profile-strict
      technology: [json]
      references:
        - https://datatracker.ietf.org/doc/html/rfc7517
        - https://datatracker.ietf.org/doc/html/rfc7518
    patterns:
      - pattern-either:
          - patterns:
              - pattern: |
                  {
                    "kty": "RSA",
                    ...,
                    "d": $D,
                    ...
                  }
              - metavariable-regex:
                  metavariable: $D
                  regex: '^"[A-Za-z0-9_-]{24,}"$'
          - patterns:
              - pattern: |
                  {
                    "kty": "EC",
                    ...,
                    "d": $D,
                    ...
                  }
              - metavariable-regex:
                  metavariable: $D
                  regex: '^"[A-Za-z0-9_-]{24,}"$'
          - patterns:
              - pattern: |
                  {
                    "kty": "OKP",
                    ...,
                    "d": $D,
                    ...
                  }
              - metavariable-regex:
                  metavariable: $D
                  regex: '^"[A-Za-z0-9_-]{24,}"$'
          - patterns:
              - pattern: |
                  {
                    "kty": "oct",
                    ...,
                    "k": $K,
                    ...
                  }
              - metavariable-regex:
                  metavariable: $K
                  regex: '^"[A-Za-z0-9_-]{24,}"$'
          - patterns:
              - pattern: |
                  {
                    "kty": "RSA",
                    ...,
                    "p": $P,
                    ...,
                    "q": $Q,
                    ...,
                    "dp": $DP,
                    ...,
                    "dq": $DQ,
                    ...
                  }
              - metavariable-regex:
                  metavariable: $P
                  regex: '^"[A-Za-z0-9_-]{24,}"$'
              - metavariable-regex:
                  metavariable: $Q
                  regex: '^"[A-Za-z0-9_-]{24,}"$'
              - metavariable-regex:
                  metavariable: $DP
                  regex: '^"[A-Za-z0-9_-]{24,}"$'
              - metavariable-regex:
                  metavariable: $DQ
                  regex: '^"[A-Za-z0-9_-]{24,}"$'
