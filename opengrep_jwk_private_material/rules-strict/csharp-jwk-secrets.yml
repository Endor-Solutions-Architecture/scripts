rules:
  - id: csharp-jwk-private-material
    message: |
      Problem:
      Hard-coded private JWK material in C# source (strict profile).

      Solution:
        1. Replace embedded key material with runtime secret retrieval.
        2. Revoke and rotate exposed key material.
        3. Review access logs for suspicious use.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "**/*.cs"
        - "**/*.csx"
    metadata:
      confidence: HIGH
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      description: Use of hard-coded private JWK material (csharp-jwk-private-material strict)
      endor-category: vulnerability
      endor-tags:
        - A07:2021
        - A07:2025
        - Authentication-Failures
        - Identification-and-Authentication-Failures
        - OWASP-Top-10
        - SANS-Top-25
        - jwk
        - csharp
        - hardcoded-credentials
        - secret-detection
        - jwk-profile-strict
      endor-targets:
        - ENDOR_TARGET_PACKAGE
        - ENDOR_TARGET_REPOSITORY
      rule-origin-note: github-esa-scripts-opengrep-jwk-private-material
      references:
        - https://datatracker.ietf.org/doc/html/rfc7517
        - https://datatracker.ietf.org/doc/html/rfc7518
      security-severity: HIGH
      source-rule-url: https://github.com/Endor-Solutions-Architecture/scripts/tree/main/opengrep_jwk_private_material
      endor-rule-origin:
        url: https://github.com/Endor-Solutions-Architecture/scripts/tree/main/opengrep_jwk_private_material
        license: MIT
      explanation: Detects hard-coded private JWK material in source files.
      remediation: Move key material to a secrets manager and rotate any exposed keys.
      impact: HIGH
      source-url-open: https://github.com/Endor-Solutions-Architecture/scripts/tree/main/opengrep_jwk_private_material
    pattern-either:
      - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"RSA"[\\\\]?[\\s\\S]{0,1600}[\\\\]?"d"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"'
      - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"EC"[\\\\]?[\\s\\S]{0,1600}[\\\\]?"d"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"'
      - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"OKP"[\\\\]?[\\s\\S]{0,1600}[\\\\]?"d"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"'
      - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"RSA"[\\\\]?[\\s\\S]{0,1600}[\\\\]?"p"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"[\\s\\S]{0,1600}[\\\\]?"q"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"[\\s\\S]{0,1600}[\\\\]?"dp"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"[\\s\\S]{0,1600}[\\\\]?"dq"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"'
      - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"oct"[\\\\]?[\\s\\S]{0,1600}[\\\\]?"k"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"'



