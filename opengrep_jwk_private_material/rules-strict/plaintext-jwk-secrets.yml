rules:
  - id: plaintext-jwk-private-material
    message: "Hardcoded private JWK material in plaintext (strict)"
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "**/*.txt"
        - "**/*.conf"
        - "**/*.ini"
        - "**/*.env"
        - "**/*.yaml"
        - "**/*.yml"
        - "**/*.toml"
        - "**/*.cfg"
        - "**/*.config"
        - "**/*.properties"
        - "**/*.tfvars"
        - "**/*.tfvars.json"
    metadata:
      category: security
      cwe:
        - CWE-798
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: HIGH
      description: >-
        Detects JSON-shaped JWK blobs in config or text files that include
        private key fields (strict profile: regex length constraints).
        Canonical rule pack:
        https://github.com/Endor-Solutions-Architecture/scripts/tree/main/opengrep_jwk_private_material
      display-name: Plaintext / config hardcoded private JWK (strict)
      endor-category: vulnerability
      rule-origin-note: github-esa-scripts-opengrep-jwk-private-material
      endor-tags:
        - jwk
        - cwe-798
        - hardcoded-credentials
        - secret-detection
        - jwk-profile-strict
      references:
        - https://datatracker.ietf.org/doc/html/rfc7517
        - https://datatracker.ietf.org/doc/html/rfc7518
    pattern-either:
      - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"RSA"[\\\\]?[\\s\\S]{0,1600}[\\\\]?"d"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"'
      - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"EC"[\\\\]?[\\s\\S]{0,1600}[\\\\]?"d"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"'
      - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"OKP"[\\\\]?[\\s\\S]{0,1600}[\\\\]?"d"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"'
      - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"RSA"[\\\\]?[\\s\\S]{0,1600}[\\\\]?"p"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"[\\s\\S]{0,1600}[\\\\]?"q"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"[\\s\\S]{0,1600}[\\\\]?"dp"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"[\\s\\S]{0,1600}[\\\\]?"dq"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"'
      - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"oct"[\\\\]?[\\s\\S]{0,1600}[\\\\]?"k"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"'
